<div class="flex sm:max-w-96 w-full p-2">
    <div class="flex flex-wrap content-center font-mono" style="font-size: 1.5rem">
        <div class="p-1">
            <i class="pi pi-heart" style="font-size: 1.5rem; color: var(--color-red-700)"></i><span class="ml-2">{{
                hero.current_hp() }}</span><span class="text-sm">/{{ hero.MAX_HP() }}</span>
        </div>
        <p-divider layout="vertical" />
        <div class="p-1">
            <i class="pi pi-database" style="font-size: 1.5rem; color: var(--color-yellow-500)"></i><span
                class="ml-2">{{ hero.current_coins() }}</span>
        </div>
    </div>
    <p-button label="Inventaire" icon="pi pi-shopping-bag" class="ml-auto" severity="secondary"
        (click)="inventaryVisibility = true" disabled />
    <p-drawer header="Inventaire" position="bottom" dismissible="false" [(visible)]="inventaryVisibility"
        [style]="{ height: 'auto' }">
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
    </p-drawer>
</div>
@if (hero.moves() > 0) {
<div class="grid grid-cols-3 grid-rows-3 aspect-square justify-center items-center">
    <p-button icon="pi pi-arrow-up-left" size="large" variant="outlined" [disabled]="!logic.allowedDirection()[0]"
        [raised]="logic.allowedDirection()[0]" (onClick)="logic.chooseDirection(0)" />
    <p-button icon="pi pi-arrow-up" size="large" variant="outlined" [disabled]="!logic.allowedDirection()[1]"
        [raised]="logic.allowedDirection()[1]" (onClick)="logic.chooseDirection(1)" />
    <p-button icon="pi pi-arrow-up-right" size="large" variant="outlined" [disabled]="!logic.allowedDirection()[2]"
        [raised]="logic.allowedDirection()[2]" (onClick)="logic.chooseDirection(2)" />
    <p-button icon="pi pi-arrow-left" size="large" variant="outlined" [disabled]="!logic.allowedDirection()[3]"
        [raised]="logic.allowedDirection()[3]" (onClick)="logic.chooseDirection(3)" />
    <div>{{ hero.moves() }}</div>
    <p-button icon="pi pi-arrow-right" size="large" variant="outlined" [disabled]="!logic.allowedDirection()[5]"
        [raised]="logic.allowedDirection()[5]" (onClick)="logic.chooseDirection(5)" />
    <p-button icon="pi pi-arrow-down-left" size="large" variant="outlined" [disabled]="!logic.allowedDirection()[6]"
        [raised]="logic.allowedDirection()[6]" (onClick)="logic.chooseDirection(6)" />
    <p-button icon="pi pi-arrow-down" size="large" variant="outlined" [disabled]="!logic.allowedDirection()[7]"
        [raised]="logic.allowedDirection()[7]" (onClick)="logic.chooseDirection(7)" />
    <p-button icon="pi pi-arrow-down-right" size="large" variant="outlined" [disabled]="!logic.allowedDirection()[8]"
        [raised]="logic.allowedDirection()[8]" (onClick)="logic.chooseDirection(8)" />
</div>
} @else {
<div>
    <p-button label="Se déplacer" [raised]="true" size="large" (onClick)="logic.startTurn()" />
</div>
}
<app-dice-modal></app-dice-modal>
<app-confirm-dialog />
