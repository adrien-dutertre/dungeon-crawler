<div class="w-full h-52 relative">
    <div [class]="visibleFace()" class="transform-3d absolute top-[calc(50%-32px)] left-[calc(50%-32px)] rotation">
        <div class="face translate-z-8 rotate-x-0">
            1
        </div>
        <div class="face translate-y-8 -rotate-x-90">
            2
        </div>
        <div class="face translate-x-8 rotate-y-90">
            3
        </div>
        <div class="face -translate-x-8 -rotate-y-90">
            4
        </div>
        <div class="face -translate-y-8 rotate-x-90">
            5
        </div>
        <div class="face -translate-z-8 rotate-y-180">
            6
        </div>
    </div>
</div>
